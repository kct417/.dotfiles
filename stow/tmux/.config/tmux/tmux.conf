unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix2 C-a
bind C-a send-prefix

bind -n C-t new-window -c "#{pane_current_path}"
bind -n C-w kill-pane
bind -n C-d detach-client

set -g mouse on
set -g set-clipboard on

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind H split-window -hb
bind J split-window -v
bind K split-window -vb
bind L split-window -h

bind -n M-h split-window -hb
bind -n M-j split-window -v
bind -n M-k split-window -vb
bind -n M-l split-window -h

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

thm_bg="#222436"
thm_fg="#c8d3f5"
thm_cyan="#86e1fc"
thm_gray="#3a3f5a"
thm_magenta="#c099ff"
thm_red="#ff757f"
thm_blue="#82aaff"
thm_black="#444a73"

# Status bar
set -g status-position top
set -g status-style "bg=default"
set -g status-left-style "bg=default"
set -g status-right-style "bg=default"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${thm_cyan},bg="default",align=centre"
set -g message-command-style "fg=${thm_cyan},bg="default",align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg="default",none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg="default",none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_blue},bg="default"] #I: #[fg=${thm_magenta},bg="default"](✓) #[fg=${thm_cyan},bg="default"]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_magenta},bg="default"]"

# Statusline - other windows
set -g window-status-format "#[fg=${thm_blue},bg="default",] #I: #[fg=${thm_fg},bg="default"]#W"

# Statusline - right side
set -g status-right "#[fg=${thm_blue},bg="default",nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics] #[fg=${thm_fg},bg="default"] #W #{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_cyan}]}#[bg="default"]#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_cyan}]}#[fg=${thm_bg}] #[fg=${thm_fg},bg="default"] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black} bold"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
